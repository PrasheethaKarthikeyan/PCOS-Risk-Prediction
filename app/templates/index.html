<!doctype html>
<html>
  <head>
    <title>PCOS Risk Prediction</title>
  </head>
  <body>
    <h1>PCOS Risk Prediction</h1>

    <form action="/predict" method="post">
      <label>Age:</label>
      <input type="number" name="age" required /><br /><br />

      <label>Weight (Kg):</label>
      <input type="number" name="weight" required /><br /><br />

      <label>Height (Cm):</label>
      <input type="number" name="height" required /><br /><br />

      <label>BMI:</label>
      <input type="number" step="0.01" name="bmi" required /><br /><br />

      <label>Pulse Rate:</label>
      <input type="number" name="pulse" required /><br /><br />

      <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction }}</h2>
  </body>
</html>
